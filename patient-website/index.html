<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קביעת תור – ClinicTor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ===== Login Page Overrides ===== */
    body.login-page {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      margin: 0;
      direction: rtl;
    }
    body.login-page .page-center {
      background: #f8fafc;
      background-image: radial-gradient(circle, #e2e8f0 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Card */
    body.login-page .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      text-align: center;
    }

    /* Card logo */
    .card-logo {
      margin: 0 auto 20px;
    }
    .card-logo img {
      height: 72px;
      width: auto;
      display: block;
      margin: 0 auto;
    }

    body.login-page .login-card h1 {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #0a2540;
      margin-bottom: 8px;
    }

    body.login-page .subtitle {
      font-size: 0.92rem;
      color: #64748b;
      margin-bottom: 32px;
    }

    /* Input groups */
    body.login-page .input-group {
      text-align: right;
      margin-bottom: 20px;
    }
    body.login-page .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #0a2540;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      height: 56px;
      padding: 0 48px 0 16px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #0a2540;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      direction: ltr;
      text-align: left;
    }
    .input-wrap input::placeholder {
      color: #94a3b8;
    }
    .input-wrap input:focus {
      border-color: #2bb66e;
      box-shadow: 0 0 0 3px rgba(43, 182, 110, 0.12);
      background: #fff;
    }
    .input-icon {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      color: #2bb66e;
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    /* Button */
    body.login-page .btn-primary {
      width: 100%;
      height: 56px;
      background: #2bb66e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      padding: 0;
    }
    body.login-page .btn-primary:hover:not(:disabled) {
      background: #24a05f;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(43, 182, 110, 0.3);
    }
    body.login-page .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }
    body.login-page .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Error */
    body.login-page .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #ef4444;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      text-align: right;
    }

    /* Help text */
    body.login-page .help-text {
      margin-top: 24px;
      font-size: 0.82rem;
      color: #64748b;
    }

    /* Footer */
    .login-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 32px;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .login-footer a {
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-footer a:hover {
      color: #64748b;
    }
    .footer-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footer-separator {
      width: 4px;
      height: 4px;
      background: #cbd5e1;
      border-radius: 50%;
    }

    /* Spinner */
    body.login-page .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @media (max-width: 500px) {
      body.login-page .login-card {
        padding: 28px 20px;
      }
      body.login-page .login-card h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body class="login-page">
  <div class="page-center">
    <div class="login-card">
      <!-- Logo inside card -->
      <div class="card-logo">
        <img src="clinicTor-transparent.png" alt="ClinicTor" />
      </div>
      <h1>קביעת תור</h1>
      <p class="subtitle">הזן את פרטי הכניסה שקיבלת מהמטפל</p>

      <form id="login-form">
        <!-- Doctor ID -->
        <div class="input-group" id="doctor-group">
          <label for="doctor-input">מזהה מטפל</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              type="text"
              id="doctor-input"
              placeholder="dr-cohen"
              autocomplete="off"
              spellcheck="false"
              required
            />
          </div>
        </div>

        <!-- UUID -->
        <div class="input-group">
          <label for="uuid-input">קוד זיהוי אישי</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="text"
              id="uuid-input"
              placeholder="A334A"
              autocomplete="off"
              spellcheck="false"
              maxlength="5"
              style="text-transform:uppercase;letter-spacing:.2em;"
              required
            />
          </div>
        </div>

        <div id="login-error" class="error-msg hidden"></div>

        <button type="submit" id="login-btn" class="btn-primary">
          <span id="btn-text">כניסה</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <p class="help-text">אין לך קוד? פנה למטפל שלך.</p>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <div class="footer-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>חיבור מאובטח</span>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    const form        = document.getElementById("login-form");
    const doctorInput = document.getElementById("doctor-input");
    const uuidInput   = document.getElementById("uuid-input");
    const loginBtn    = document.getElementById("login-btn");
    const btnText     = document.getElementById("btn-text");
    const btnSpinner  = document.getElementById("btn-spinner");
    const errorDiv    = document.getElementById("login-error");

    // Pre-fill doctor ID from URL param ?doctor=X
    const urlParams   = new URLSearchParams(window.location.search);
    const doctorParam = urlParams.get("doctor");
    if (doctorParam) {
      doctorInput.value    = doctorParam;
      doctorInput.readOnly = true;
      document.getElementById("doctor-group").style.opacity = "0.7";
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      btnText.classList.toggle("hidden", loading);
      btnSpinner.classList.toggle("hidden", !loading);
    }

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.remove("hidden");
    }

    function hideError() {
      errorDiv.classList.add("hidden");
    }

    // Format: one letter + 3 digits + same letter (e.g. A334A, B939B)
    const ID_REGEX = /^[A-Z]\d{3}[A-Z]$/i;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();

      const doctorId  = doctorInput.value.trim().toLowerCase();
      const uuid      = uuidInput.value.trim().toUpperCase();

      if (!doctorId) {
        showError("נא להזין מזהה מטפל");
        return;
      }
      if (!ID_REGEX.test(uuid)) {
        showError("פורמט קוד זיהוי שגוי (לדוגמה: A334A)");
        return;
      }

      setLoading(true);

      try {
        // Sign in anonymously so Firestore rules (request.auth != null) pass
        await signInAnonymously(auth);

        // Verify UUID under /doctors/{doctorId}/patients/{uuid}
        const patientRef  = doc(db, "doctors", doctorId, "patients", uuid);
        const patientSnap = await getDoc(patientRef);

        if (!patientSnap.exists()) {
          showError("קוד הזיהוי לא קיים אצל מטפל זה. בדוק שהקלדת נכון.");
          setLoading(false);
          return;
        }

        sessionStorage.setItem("patientId", uuid);
        sessionStorage.setItem("doctorId",  doctorId);
        window.location.href = "calendar.html";

      } catch (err) {
        console.error("Login error:", err);
        showError("שגיאת חיבור. בדוק את החיבור לאינטרנט ונסה שוב.");
        setLoading(false);
      }
    });

  </script>
</body>
</html>
