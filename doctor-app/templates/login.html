{% extends "base.html" %}
{% block title %}התחברות{% endblock %}

{% block head %}
<style>
  body {
    background: #F8FAFC !important;
    min-height: 100vh;
  }
  .login-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .clinic-logo-doctor {
    margin-bottom: 28px;
  }
  .clinic-logo-doctor img {
    height: 64px;
    width: auto;
    display: block;
    margin: 0 auto;
  }
  .login-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 440px;
    padding: 40px;
  }
  .login-icon {
    width: 56px;
    height: 56px;
    background: #EBF5FF;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
  .login-icon svg {
    width: 28px;
    height: 28px;
    color: #196EE6;
  }
  .login-brand {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #0F172A;
    text-align: center;
    margin-bottom: 4px;
  }
  .login-tagline {
    font-size: 0.9rem;
    color: #64748B;
    text-align: center;
    margin-bottom: 32px;
  }
  .login-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: #0F172A;
    text-align: center;
    margin-bottom: 6px;
  }
  .login-subtitle {
    font-size: 0.82rem;
    color: #64748B;
    text-align: center;
    margin-bottom: 28px;
  }
  .login-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #0F172A;
    margin-bottom: 6px;
    display: block;
  }
  .login-input-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .login-input-wrap .form-control {
    background: #F1F5F9;
    border: 1px solid #E2E8F0;
    border-radius: 8px;
    padding: 12px 44px 12px 44px;
    font-size: 0.92rem;
    color: #0F172A;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-input-wrap .form-control::placeholder {
    color: #94A3B8;
  }
  .login-input-wrap .form-control:focus {
    background: #fff;
    border-color: #196EE6;
    box-shadow: 0 0 0 3px rgba(25, 110, 230, 0.12);
  }
  .login-input-icon {
    position: absolute;
    top: 50%;
    right: 14px;
    transform: translateY(-50%);
    color: #94A3B8;
    pointer-events: none;
  }
  .login-toggle-pw {
    position: absolute;
    top: 50%;
    left: 14px;
    transform: translateY(-50%);
    color: #94A3B8;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }
  .login-toggle-pw:hover {
    color: #64748B;
  }
  .login-forgot {
    display: block;
    text-align: left;
    font-size: 0.8rem;
    color: #196EE6;
    text-decoration: none;
    margin-bottom: 4px;
  }
  .login-forgot:hover {
    text-decoration: underline;
    color: #1258b8;
  }
  .login-btn {
    width: 100%;
    background: #196EE6;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }
  .login-btn:hover:not(:disabled) {
    background: #1258B8;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(25, 110, 230, 0.3);
  }
  .login-btn:active:not(:disabled) {
    transform: translateY(0);
  }
  .login-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }
  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.85rem;
    color: #64748B;
  }
  .login-footer a {
    color: #196EE6;
    font-weight: 600;
    text-decoration: none;
  }
  .login-footer a:hover {
    text-decoration: underline;
  }
  /* Override base.html container padding for login page */
  .container-fluid { padding: 0 !important; }
  .login-alert {
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
  <!-- Logo above card -->
  <div class="clinic-logo-doctor">
    <img src="{{ url_for('static', filename='img/clinicTor.png') }}" alt="ClinicTor" />
  </div>

  <div class="login-card">

    <!-- Icon -->
    <div class="login-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm7 11h-3v3h-4v-3H7v-4h3V8h4v3h3v4z"/>
      </svg>
    </div>

    <!-- Brand -->
    <div class="login-brand">AnonimousQ</div>
    <div class="login-tagline">מערכת ניהול תורים חכמה</div>

    <!-- Title -->
    <div class="login-title">התחברות</div>
    <div class="login-subtitle">אנא הזן את פרטי המשתמש שלך כדי להמשיך</div>

    <!-- Form -->
    <form method="post" id="loginForm">
      <!-- Username -->
      <label class="login-label">שם משתמש</label>
      <div class="login-input-wrap">
        <span class="login-input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <input type="text" name="username" class="form-control"
               placeholder="הכנס שם משתמש" required autofocus autocomplete="username" />
      </div>

      <!-- Password -->
      <div class="d-flex justify-content-between align-items-baseline">
        <label class="login-label">סיסמא</label>
      </div>
      <div class="login-input-wrap" style="margin-bottom: 8px;">
        <span class="login-input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" name="password" id="pwInput" class="form-control"
               placeholder="הכנס סיסמא" required autocomplete="current-password" />
        <button type="button" class="login-toggle-pw" id="togglePw" tabindex="-1">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Submit button -->
      <button type="submit" id="loginBtn" class="login-btn">
        <span id="btnText">
          כניסה
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:scaleX(-1)">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </span>
        <span id="btnSpinner" class="d-none">
          <span class="spinner-border spinner-border-sm me-2"></span>
          מתחבר...
        </span>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      אין לך חשבון עדיין?
      <a href="{{ url_for('setup') }}">צור חשבון חדש</a>
    </div>

  </div>
</div>

<script>
// Toggle password visibility
document.getElementById('togglePw').addEventListener('click', function() {
  var pw = document.getElementById('pwInput');
  var icon = document.getElementById('eyeIcon');
  if (pw.type === 'password') {
    pw.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    pw.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

// Submit spinner
document.getElementById('loginForm').addEventListener('submit', function() {
  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('btnText').classList.add('d-none');
  document.getElementById('btnSpinner').classList.remove('d-none');
});
</script>
{% endblock %}
